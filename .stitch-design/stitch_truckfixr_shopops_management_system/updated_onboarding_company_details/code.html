            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

            font-family: 'Inter', sans-serif;
            background-color: #f9f9ff;

            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }

<body class="bg-background text-on-surface min-h-screen flex flex-col items-center justify-center p-gutter">
<!-- Top Navigation Bar (Suppressed because it's Onboarding) -->
<main class="w-full max-w-[480px] flex flex-col items-center">
<!-- Logo Section -->
<div class="mb-unit-lg text-center">
<img alt="TruckFixr ShopOps" class="w-24 h-24 mb-base rounded-xl object-contain mx-auto" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCjxxC4BYbmmouoVdnmacS0lODEwV_GyS_De8yVyBNGDSvIkPNn-7PXl876mQqZkiei3NHslyMROJhYc89F5JavpTANVeVVctIjDAqNmsI5c9RKBASBsIpwUm6Ned3cZQXQlwbMB0dDffBNz5IJjWXICInCfEW9k5mSwYd-PG8N7k05h4R4hkHC5AgpNRFKBRAXzNjmpNuMEWV-QFahzyzeHCudc4hAPZmvJM7Mxr8jzZ-3XNAarhpSQhgIVWzUWIE-7M16Vix-j0UM"/>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary tracking-tight">TruckFixr ShopOps</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-2">Finish setting up your terminal</p>
</div>
<!-- Onboarding Form Container -->
<div class="onboarding-card bg-surface-container-lowest border border-outline-variant w-full p-gutter rounded-xl">
<form class="flex flex-col gap-6" id="onboardingForm">
<!-- Company Name Field -->
<div class="flex flex-col gap-2">
<label class="font-label-bold text-label-bold text-on-surface flex items-center gap-2" for="companyName">
<span class="material-symbols-outlined text-[18px]">business</span>
                        Company Name
                    </label>
<input class="h-touch-target w-full rounded-xl border border-outline px-4 focus:ring-2 focus:ring-primary focus:border-primary bg-surface-bright text-on-surface transition-all" id="companyName" name="companyName" placeholder="e.g. Precision Heavy Truck Repair" type="text"/>
</div><div class="flex flex-col gap-2">
<label class="font-label-bold text-label-bold text-on-surface flex items-center gap-2" for="phoneNumber">
<span class="material-symbols-outlined text-[18px]">phone</span>
                        Phone Number
                    </label>
<input class="h-touch-target w-full rounded-xl border border-outline px-4 focus:ring-2 focus:ring-primary focus:border-primary bg-surface-bright text-on-surface transition-all" id="phoneNumber" name="phoneNumber" placeholder="(555) 000-0000" type="tel"/>
</div>
<!-- Province Dropdown -->
<div class="flex flex-col gap-2">
<label class="font-label-bold text-label-bold text-on-surface flex items-center gap-2" for="province">
<span class="material-symbols-outlined text-[18px]">map</span>
                        Province
                    </label>
<div class="relative">
<select class="h-touch-target w-full appearance-none rounded-xl border border-outline px-4 pr-10 focus:ring-2 focus:ring-primary focus:border-primary bg-surface-bright text-on-surface transition-all" id="province" name="province">
<option value="Alberta">Alberta</option>
<option value="British Columbia">British Columbia</option>
<option value="Manitoba">Manitoba</option>
<option value="New Brunswick">New Brunswick</option>
<option value="Newfoundland and Labrador">Newfoundland and Labrador</option>
<option value="Nova Scotia">Nova Scotia</option>
<option selected="" value="Ontario">Ontario</option>
<option value="Prince Edward Island">Prince Edward Island</option>
<option value="Quebec">Quebec</option>
<option value="Saskatchewan">Saskatchewan</option>
<option value="Northwest Territories">Northwest Territories</option>
<option value="Nunavut">Nunavut</option>
<option value="Yukon">Yukon</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-3 pointer-events-none text-on-surface-variant">arrow_drop_down</span>
</div>
</div><div class="flex flex-col gap-2">
<label class="font-label-bold text-label-bold text-on-surface flex items-center gap-2" for="emailAddress">
<span class="material-symbols-outlined text-[18px]">mail</span>
                        Email Address
                    </label>
<input class="h-touch-target w-full rounded-xl border border-outline px-4 focus:ring-2 focus:ring-primary focus:border-primary bg-surface-bright text-on-surface transition-all" id="emailAddress" name="emailAddress" placeholder="contact@company.com" type="email"/>
</div>
<!-- Labour Rate Field -->
<div class="flex flex-col gap-2">
<label class="font-label-bold text-label-bold text-on-surface flex items-center gap-2" for="labourRate">
<span class="material-symbols-outlined text-[18px]">payments</span>
                        Default Labour Rate ($/hr)
                    </label>
<div class="relative">
<span class="absolute left-4 top-3 text-on-surface-variant">$</span>
<input class="h-touch-target w-full rounded-xl border border-outline pl-8 pr-4 focus:ring-2 focus:ring-primary focus:border-primary bg-surface-bright text-on-surface transition-all" id="labourRate" name="labourRate" placeholder="125" step="0.50" type="number"/>
</div>
</div>
<!-- Action Button -->
<button class="h-touch-target bg-primary text-on-primary font-label-bold text-label-bold rounded-xl active:scale-95 transition-transform duration-100 flex items-center justify-center gap-2 mt-2 shadow-sm" type="submit">
                    Get Started
                    <span class="material-symbols-outlined">arrow_forward</span>
</button>
<!-- Footer Note -->
<div class="flex items-start gap-3 p-4 bg-surface-container-low rounded-xl border border-outline-variant border-dashed">
<span class="material-symbols-outlined text-primary text-[20px]">info</span>
<p class="font-label-sm text-label-sm text-on-surface-variant">
                        You can change everything else later in Settings.
                    </p>
</div>
</form>
</div>
<!-- System Status Bar (Industrial Aesthetic) -->
<div class="mt-8 flex items-center gap-6 text-on-surface-variant/40 select-none">
<div class="flex items-center gap-1">
<span class="material-symbols-outlined text-[16px]">lock</span>
<span class="text-[10px] font-bold uppercase tracking-widest">Secure Terminal</span>
</div>
<div class="w-1 h-1 bg-outline-variant rounded-full"></div>
<div class="flex items-center gap-1">
<span class="material-symbols-outlined text-[16px]">verified</span>
<span class="text-[10px] font-bold uppercase tracking-widest">ISO 27001</span>
</div>
</div>
</main>
<!-- Interactive Layer -->
<script>
        document.getElementById('onboardingForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalHtml = btn.innerHTML;
            
            // Industrial Loading State
            btn.disabled = true;
            btn.innerHTML = `
                <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <span>Initializing ShopOps...</span>
            `;

            setTimeout(() => {
                btn.innerHTML = `
                    <span class="material-symbols-outlined">check_circle</span>
                    <span>Ready</span>
                `;
                btn.classList.replace('bg-primary', 'bg-status-approved');
                
                // Subtle haptic feedback simulation
                if (window.navigator && window.navigator.vibrate) {
                    window.navigator.vibrate(20);
                }
            }, 1500);
        });

        // Add visual focus glow to active inputs
        const inputs = document.querySelectorAll('input, select');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('scale-[1.01]');
                input.parentElement.classList.add('transition-transform');
            });
            input.addEventListener('blur', () => {
                input.parentElement.classList.remove('scale-[1.01]');
            });
        });
    </script>
</body></html>
